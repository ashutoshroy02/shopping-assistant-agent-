<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Shopping Assistant</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
.header { background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header span { color: #94a3b8; font-size: 14px; }
.container { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; padding: 0 16px; }
#messages { flex: 1; overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
.msg.user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
.msg.bot strong { color: #60a5fa; }
.msg.error { background: #7f1d1d; border-color: #dc2626; color: #fca5a5; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 0 16px; justify-content: center; }
.suggestions button { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.suggestions button:hover { background: #334155; color: white; border-color: #60a5fa; }
.typing { display: none; align-self: flex-start; padding: 8px 16px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
.typing.active { display: flex; gap: 4px; align-items: center; }
.typing span { width: 6px; height: 6px; background: #60a5fa; border-radius: 50%; animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
.input-area { padding: 16px 0 24px; display: flex; gap: 8px; }
#input { flex: 1; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 12px; font-size: 14px; outline: none; resize: none; min-height: 48px; max-height: 120px; font-family: inherit; }
#input:focus { border-color: #60a5fa; }
#send { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
#send:hover { background: #1d4ed8; }
#send:disabled { background: #334155; cursor: not-allowed; }
.auth-bar { background: #1e293b; padding: 12px 24px; border-bottom: 1px solid #334155; display: flex; gap: 8px; align-items: center; }
.auth-bar input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 6px 12px; border-radius: 6px; font-size: 12px; width: 200px; }
.auth-bar button { background: #2563eb; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.auth-bar .status { font-size: 12px; margin-left: auto; }
.auth-bar .status.ok { color: #4ade80; }
.auth-bar .status.err { color: #f87171; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-top: 8px; }
.product-card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 12px; }
.product-card .title { font-weight: 600; margin-bottom: 4px; }
.product-card .price { color: #4ade80; font-weight: 600; }
.product-card .rating { color: #fbbf24; }
</style>
</head>
<body>
<div class="header">
  <h1>&#128722; AI Shopping Assistant</h1>
  <span>Powered by LangGraph + Groq LLM</span>
</div>
<div class="auth-bar">
  <input type="email" id="email" placeholder="Email" value="admin@test.com">
  <input type="password" id="password" placeholder="Password" value="admin123">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
  <span id="authStatus" class="status"></span>
</div>
<div class="container">
  <div id="messages"></div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
  <div class="suggestions" id="suggestions">
    <button onclick="send('Find gaming laptops under 100000')">Gaming Laptops</button>
    <button onclick="send('Best smartphones under 70000')">Smartphones</button>
    <button onclick="send('Compare top 2 laptops')">Compare Laptops</button>
    <button onclick="send('Best headphones for music')">Headphones</button>
    <button onclick="send('Best monitors for coding')">Monitors</button>
  </div>
  <div class="input-area">
    <textarea id="input" placeholder="Ask about products, compare, or get recommendations..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button id="send" onclick="sendMsg()">Send</button>
  </div>
</div>
<script>
let token = null;
const API = '';

function addMsg(text, cls='bot') {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.innerHTML = text;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}

function showTyping() { document.getElementById('typing').classList.add('active'); }
function hideTyping() { document.getElementById('typing').classList.remove('active'); }

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    const r = await fetch(API + '/api/v1/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await r.json();
    if (data.access_token) {
      token = data.access_token;
      document.getElementById('authStatus').className = 'status ok';
      document.getElementById('authStatus').textContent = 'Logged in';
      addMsg('Welcome! Ask me anything about products.', 'bot');
    } else {
      document.getElementById('authStatus').className = 'status err';
      document.getElementById('authStatus').textContent = data.error?.message || 'Login failed';
    }
  } catch(e) {
    document.getElementById('authStatus').className = 'status err';
    document.getElementById('authStatus').textContent = 'Server not running';
  }
}

async function register() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const name = email.split('@')[0];
  try {
    await fetch(API + '/api/v1/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password})
    });
    await login();
  } catch(e) {}
}

async function send(text) {
  document.getElementById('input').value = text;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !token) return;
  input.value = '';
  addMsg(text, 'user');
  document.getElementById('suggestions').style.display = 'none';
  showTyping();
  document.getElementById('send').disabled = true;

  try {
    const r = await fetch(API + '/api/v1/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token},
      body: JSON.stringify({message: text})
    });
    const data = await r.json();
    hideTyping();
    if (data.response) {
      let html = data.response.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      if (data.products && data.products.length > 0) {
        html += '<div class="products-grid">';
        data.products.slice(0,6).forEach(p => {
          html += `<div class="product-card">
            <div class="title">${p.title || 'N/A'}</div>
            <div class="price">Rs.${(p.price||0).toLocaleString('en-IN')}</div>
            <div class="rating">${p.rating ? 'Rating: ' + p.rating + '/5' : ''}</div>
          </div>`;
        });
        html += '</div>';
      }
      addMsg(html, 'bot');
    } else {
      addMsg('No response received. Try again.', 'error');
    }
  } catch(e) {
    hideTyping();
    addMsg('Error: ' + e.message, 'error');
  }
  document.getElementById('send').disabled = false;
}

// Auto-login on load
login();
</script>
</body>
</html>
